# ============================================================
# SIRI-AI JTM — Netlify Deployment Configuration
# Per PRD §13 (Pelan Penempatan — Netlify)
# ============================================================

[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # Next.js 16 + Turbopack
  NEXT_TELEMETRY_DISABLED = "1"

# ============================================================
# Next.js plugin (auto-detected by Netlify, but explicit here)
# ============================================================
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ============================================================
# Headers — Security (per PRD §12)
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================================
# Redirects — SPA fallback (per PRD §13.3)
# ============================================================
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # Don't redirect API or Next.js internal routes
  force = false
  conditions = {Path = ["!/api/*", "!/_next/*"]}
